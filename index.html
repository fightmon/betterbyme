<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>我來作也不會太差</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0a0a0e; --bg-soft:#15151c; --ink:#f0f0f5; --ink-dim:#b8b8c0; --mute:#666;
    --gold:#d4af37; --gold-soft:#a8862c; --red:#d63b3b; --line:#222;
  }
  html, body { background: var(--bg); color: var(--ink); }
  body {
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    line-height: 1.75;
    min-height: 100vh;
    padding: 48px 20px 80px;
    background-image:
      radial-gradient(800px 400px at 50% 0%, rgba(212,175,55,0.05) 0%, transparent 60%),
      radial-gradient(600px 400px at 50% 100%, rgba(214,59,59,0.04) 0%, transparent 60%);
    background-attachment: fixed;
  }
  .wrap { max-width: 920px; margin: 0 auto; }


  /* SUSPECT PORTRAIT */
  .suspect {
    margin: 32px auto 8px;
    max-width: 320px;
    width: min(320px, 75vw);
    text-align: center;
  }
  .suspect img {
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
    display: block;
    border-radius: 14px;
    border: 3px solid #2a2a35;
    box-shadow: 0 10px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(212,175,55,0.15) inset;
  }
  .suspect-caption {
    margin-top: 12px;
    color: var(--gold);
    font-size: 11.5px;
    letter-spacing: 4px;
    font-weight: 900;
  }
  @media (max-width: 600px) {
    .suspect { max-width: 240px; width: 64vw; margin: 20px auto 4px; }
    .suspect-caption { font-size: 10.5px; letter-spacing: 3px; }
  }

  /* HEADER */
  .stamp {
    display: inline-block;
    border: 2px solid var(--gold);
    color: var(--gold);
    padding: 4px 12px;
    font-size: 11px;
    letter-spacing: 4px;
    font-weight: 900;
    border-radius: 4px;
    margin-bottom: 18px;
    transform: rotate(-1deg);
  }
  .title {
    font-family: "Noto Serif TC", serif;
    font-size: clamp(40px, 7vw, 72px);
    font-weight: 900;
    line-height: 1.15;
    letter-spacing: -2px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #fff 30%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    color: var(--ink-dim);
    font-size: clamp(15px, 1.8vw, 18px);
    margin-bottom: 8px;
  }
  .lede {
    color: var(--mute);
    font-size: 14px;
    margin-bottom: 40px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--line);
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  @media (max-width: 980px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .btn { padding: 8px 4px; gap: 5px; border-radius: 10px; }
    .btn-icon { font-size: 26px; }
    .btn-label { font-size: 12.5px; line-height: 1.3; font-weight: 700; letter-spacing: 0; }
  }
  @media (max-width: 400px) {
    .grid { gap: 6px; }
    .btn { padding: 6px 3px; }
    .btn-icon { font-size: 22px; }
    .btn-label { font-size: 11.5px; line-height: 1.2; }
  }

  .btn {
    background: var(--bg-soft);
    border: 1px solid #2a2a35;
    color: var(--ink-dim);
    padding: 10px 8px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    aspect-ratio: 1 / 1;
    text-align: center;
    overflow: hidden;
  }
  .btn-icon {
    font-size: 32px;
    line-height: 1;
    display: block;
    transition: transform 0.2s ease;
  }
  .btn-label {
    font-size: 15.5px;
    font-weight: 800;
    line-height: 1.4;
    letter-spacing: 0.5px;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .btn:hover .btn-icon { transform: scale(1.12); }
  .btn:hover {
    background: #20202a;
    border-color: var(--gold-soft);
    color: var(--ink);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(212,175,55,0.12);
  }
  .btn.active {
    background: linear-gradient(135deg, var(--gold), #b08820);
    border-color: var(--gold);
    color: #1a1a1a;
    font-weight: 900;
    box-shadow: 0 6px 24px rgba(212,175,55,0.35);
  }
  .btn.custom {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, #2a1818, #1a1010);
    border: 1px solid #5a2a2a;
    color: #f5a5a5;
    aspect-ratio: auto;
    height: 72px;
    flex-direction: row;
    gap: 10px;
  }
  .btn.custom .btn-icon { font-size: 24px; }
  .btn.custom .btn-label { font-size: 16px; }
  @media (max-width: 600px) {
    .btn.custom { height: 60px; gap: 8px; }
    .btn.custom .btn-icon { font-size: 20px; }
    .btn.custom .btn-label { font-size: 14px; }
  }
  .btn.custom:hover {
    background: linear-gradient(135deg, #3a1a1a, #2a1414);
    border-color: var(--red);
    color: #ffdada;
  }
  .btn.custom.active {
    background: linear-gradient(135deg, var(--red), #a02020);
    color: #fff;
    box-shadow: 0 6px 24px rgba(214,59,59,0.40);
  }
  

  /* ANSWER */
  .answer {
    background: linear-gradient(180deg, rgba(20,20,28,0.95), rgba(10,10,14,0.95));
    border: 1px solid #2a2a35;
    border-radius: 12px;
    padding: 36px 32px;
    margin-top: 28px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    min-height: 200px;
    display: none;
  }
  .answer.show {
    opacity: 1;
    transform: translateY(0);
    display: block;
  }
  .answer-case {
    font-size: 11.5px;
    color: var(--gold);
    letter-spacing: 4px;
    font-weight: 900;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .answer-quote {
    font-family: "Noto Serif TC", serif;
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 900;
    color: #fff;
    line-height: 1.45;
    margin-bottom: 22px;
    padding-left: 18px;
    border-left: 3px solid var(--gold);
  }
  .answer-body {
    font-size: 16px;
    line-height: 2;
    color: #d5d5dc;
  }
  .answer-body b, .answer-body strong {
    color: var(--gold);
    font-weight: 700;
  }
  .answer.custom-mode { border-color: rgba(214,59,59,0.45); }
  .answer.custom-mode .answer-case { color: var(--red); }
  .answer.custom-mode .answer-quote {
    border-left-color: var(--red);
    font-size: clamp(24px, 4vw, 36px);
  }
  .answer.custom-mode .answer-body {
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 700;
    color: #fff;
    line-height: 1.7;
  }

  /* FOOTER */
  .footer {
    text-align: center;
    margin-top: 60px;
    padding-top: 32px;
    border-top: 1px solid var(--line);
    color: var(--mute);
    font-size: 13.5px;
    line-height: 2;
  }
  .footer strong { color: var(--ink-dim); }

  /* Hint at top */
  .hint {
    text-align: center;
    color: var(--mute);
    font-size: 13px;
    margin: 12px 0 4px;
    letter-spacing: 1px;
  }
</style>
</head>

    quote: '山路 + 40 噸 + 強風 — AI 自駕還在 LV3。',
    body: '你來開聯結車。AI 自駕？目前自駕到 2026 還在 LV3（人類必須隨時接手）。聯結車 <b>40 噸、山路、強風</b>、會閃避機車的台灣道路、會臨停的轎車、會違規的紅綠燈、會凌晨 3 點開車的疲勞司機。AI 沒辦法判斷「前面那輛賓士剛剛在加油站講電話、現在開車一定恍神」這種人類經驗。聯結車司機 20 年資歷 + 大車駕照 + 體力 + 反應 + 山路經驗。你「不會太差」？你連停車場都倒不進去。'
  },
  custom: {
    case: '卷宗 #028 ｜（你自己）',
    quote: '還要我回答？',
    body: '你不是說你來作也不會太差？<br><br><span style="color:var(--gold)">你來作。</span>'
  }
};

const buttons = document.querySelectorAll('.btn');
const answerBox = document.getElementById('answer');
const answerCase = document.getElementById('answerCase');
const answerQuote = document.getElementById('answerQuote');
const answerBody = document.getElementById('answerBody');

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    const id = btn.dataset.id;
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const reply = REPLIES[id];
    if (!reply) return;

    answerCase.textContent = reply.case;
    answerQuote.textContent = reply.quote;
    answerBody.innerHTML = reply.body;

    if (id === 'custom') {
      answerBox.classList.add('custom-mode');
    } else {
      answerBox.classList.remove('custom-mode');
    }

    answerBox.classList.add('show');
    setTimeout(() => {
      answerBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 50);
  });
});
</script>

</body>
</html>
